<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/styles.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid position-relative">
    <span class="navbar-brand position-absolute top-50 start-50 translate-middle fs-3 h1">
      The App
    </span>
    <button class="btn btn-outline-light btn-sm ms-auto" id="logoutBtn">
      Logout
    </button>
  </div>
</nav>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 85vh;">

    <div class="card p-4 mt-3 cardp pb-0">

        <h4 class=" mb-4">Edit Profile</h4>

        <div id="userInfo" class="mb-3 text-muted"></div>

        <form id="profileForm">

            <div class="mb-3">
                <label class="form-label fw-semibold">Date of Birth</label>
                <input type="date" id="dob" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Contact</label>
                <input type="text" id="contact" class="form-control" placeholder="Enter contact number">
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Address</label>
                <input type="text" id="address" class="form-control" placeholder="Enter address">
            </div>

            <button type="button" id="save" class="btn btn-primary w-100">
                Save Changes
            </button>

        </form>

        <p id="message" class="mt-2 text-center text-success"></p>

    </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/profile.js"></script>

</body>
</html>
