<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - The App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/styles.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid position-relative">
    
    <span class="navbar-brand position-absolute top-50 start-50 translate-middle fs-3 h1">
      The App
    </span>

  </div>
</nav>

<div class="container d-flex justify-content-center align-items-center" style="height: 85vh;">

    <div class="card shadow p-4" style="width: 350px; border-radius: 12px;">

        <h4 class="text-center mb-4">Register Account</h4>

        <div class="mb-3">
            <input type="text" id="name" class="form-control field" placeholder="Name" required>
        </div>

        <div class="mb-3">
            <input type="email" id="email" class="form-control field" placeholder="Email" required>
        </div>

        <div class="mb-3">
            <input type="password" id="password" class="form-control field" placeholder="Password" required>
        </div>

        <button type="button" id="registerBtn" class="btn btn-primary w-100">
            Register
        </button>

        <p id="message" class="text-center mt-3"></p>

        <p class="text-center mb-2">Already have an account?</p>

        <a href="login.html" class="btn btn-outline-success w-100">
            Login
        </a>

    </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/register.js"></script>

</body>
</html>
