<!DOCTYPE html>
<html>
<head>
    <title>Login - The App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/styles.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid position-relative">
    
    <span class="navbar-brand position-absolute top-50 start-50 translate-middle fs-3 h1">
      The App
    </span>

  </div>
</nav>

<div class="container d-flex justify-content-center align-items-center" style="height: 85vh;">

    <div class="card shadow p-4" style="width: 350px; border-radius: 12px;">
        
        <h4 class="text-center mb-4">Login</h4>

        <form id="loginForm">

            <div class="mb-3">
                <input type="email" id="email" class="form-control field" placeholder="Email" required>
            </div>

            <div class="mb-3">
                <input type="password" id="password" class="form-control field" placeholder="Password" required>
            </div>

            <button type="button" id="loginBtn" class="btn btn-success w-100">
                Login
            </button>

        </form>

        <p id="message" class="text-center mt-3 text-danger"></p>   

        <p class="text-center mb-2">Not registered yet?</p>

        <a href="register.html" class="btn btn-outline-primary w-100">
            Register Account
        </a>

    </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/login.js"></script>

</body>
</html>
